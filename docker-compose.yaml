x-airflow-env: &airflow-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
  AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
  MLFLOW_TRACKING_URI: http://mlflow:5000
  MLFLOW_EXPERIMENT_NAME: coding-agent-eval
  HOST_PROJECT_DIR: ${HOST_PROJECT_DIR:-/opt/airflow}
  AGENT_IMAGE: ${AGENT_IMAGE:-mlops-assignment:latest}
  NEBIUS_API_KEY: ${NEBIUS_API_KEY:-}
  S3_BUCKET: ${S3_BUCKET:-}
  S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
  S3_PREFIX: ${S3_PREFIX:-runs}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
  AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-eu-north1}

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.2
    command: >-
      mlflow server
      --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow
    restart: unless-stopped

  airflow:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    image: mlops-airflow:latest
    command: standalone
    depends_on:
      postgres:
        condition: service_healthy
    environment: *airflow-env
    user: "0:0"
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./pipeline:/opt/airflow/pipeline
      - ./scripts:/opt/airflow/scripts
      - ./runs:/opt/airflow/runs
      - airflow-logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

volumes:
  postgres-data:
  mlflow-data:
  airflow-logs:
